      - "移除 path_mapping、usage_guidelines 等冗余配置"
      - "明确根目录文件：[案件编号]案件信息.md"
      - "简化 00 - 📅 日程管理 目录，不创建子目录"
      - "保留核心信息：目录名称、描述、核心文件"
    author: "GLM"

