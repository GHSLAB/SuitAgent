# SuitAgent 案件目录路径配置
# 版本: v2.2
# 最后更新: 2025-12-31
# 说明: 单一真实源，定义案件目录结构

# 目录命名格式
naming_convention:
  format: "{id} - {emoji} {name}"
  example: "00 - 📅 日程管理"
  rule: "横线前后必须有空格，emoji后必须有空格"

# 案件目录结构（12层架构）
directories:
  "00 - 📅 日程管理":
    description: "期限管理、工时统计、任务看板"
    note: "包含结构化数据（YAML）和详细记录（MD），不创建子目录"

  "01 - 🤝 委托材料":
    description: "委托合同、授权书、谈话笔录、服务方案"

  "02 - 📄 案件分析":
    description: "案件分析报告、争议焦点、风险评估、策略方案"

  "03 - 🔍 法律研究":
    description: "争议焦点分析、法条检索、判例研究、法律适用"

  "04 - 📤 客户提供":
    description: "客户主动提供的材料、情况说明、背景资料"

  "05 - 📎 证据材料":
    description: "证据目录、质证意见、证据分析报告、鉴定报告"

  "06 - 📝 法律文书":
    description: "起诉状、答辩状、代理词、申请书等各类文书"
    note: "所有法律文书直接存放，不创建二级子目录"

  "07 - 📥 对方提交":
    description: "对方起诉状、证据、答辩书、上诉材料"

  "08 - 🏛️ 法院送达":
    description: "传票、应诉通知、举证通知、裁定书、判决书"

  "09 - 🎯 庭审笔录":
    description: "庭审记录、庭审要点、质证情况、庭后分析"

  "10 - 📊 综合报告":
    description: "案件摘要、风险报告、阶段进展、客户汇报"

  "11 - 📚 参考文件":
    description: "参考案例、法律条文、行业标准、学术论文"

# 核心文件说明
core_files:
  # 根目录文件（案件级记忆，AI优化）
  overview:
    path: "[案件编号]案件信息.md"
    description: "案件管理看板，AI快速了解案件全貌"
    location: "案件根目录"

  # 日程管理文件（详细记录，人工查阅）
  scheduling:
    - path: "00 - 📅 日程管理/[案件编号].yaml"
      description: "结构化期限与任务数据"
    - path: "00 - 📅 日程管理/[案件编号]工时记录.md"
      description: "详细工时记录与费用核算"

# 变更日志
