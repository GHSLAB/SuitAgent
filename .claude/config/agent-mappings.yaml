# SuitAgent Agent与目录映射配置
# 版本: v1.0
# 最后更新: 2025-12-31
# 说明: 单一真实源，定义所有Agent的输出目录映射关系

# 映射规则说明：
# - primary: 主要输出目录
# - secondary: 次要输出目录（可选，列表）
# - note: 特殊说明（可选）

agent_directory_mapping:
  # 输入层 - 文档数据采集
  DocAnalyzer:
    primary: "02 - 📄 案件分析"
    secondary:
      - "04 - 📤 客户提供"
      - "07 - 📥 对方提交"
      - "08 - 🏛️ 法院送达"
      - "09 - 🎯 庭审笔录"
    note: "分析各类法律文档，提取结构化信息"

  EvidenceAnalyzer:
    primary: "05 - 📎 证据材料"
    secondary:
      - "07 - 📥 对方提交"
    note: "深度分析证据材料，评估证明力"

  # 分析层 - 智能分析与研究
  IssueIdentifier:
    primary: "03 - 🔍 法律研究"
    secondary: []
    note: "识别和归类争议焦点"

  Researcher:
    primary: "03 - 🔍 法律研究"
    secondary:
      - "11 - 📚 参考文件"
    note: "法条解读、判例检索、法律适用研究"

  Strategist:
    primary: "02 - 📄 案件分析"
    secondary: []
    note: "SWOT分析、策略制定、风险评估"

  # 输出层 - 文书生成与报告
  Writer:
    primary: "06 - 📝 法律文书"
    secondary:
      - "01 - 🤝 委托材料"
    note: "起草各类法律文书"

  Reporter:
    primary: "10 - 📊 综合报告"
    secondary: []
    note: "整合所有内容，生成综合报告"

  Summarizer:
    primary: "10 - 📊 综合报告"
    secondary:
      - "09 - 🎯 庭审笔录"
    note: "生成各类摘要和简报"

  # 支持层 - 质量保证与辅助
  Scheduler:
    primary: "00 - 📅 日程管理"
    secondary:
      - "08 - 🏛️ 法院送达"
    note: "期限管理、工时统计"

  Reviewer:
    primary: null
    secondary: []
    note: "智能审查器，质量把关专家，不直接输出文件"

# 目录反向映射（目录 → Agent）
# 用途：快速查找哪些Agent会向某个目录输出
directory_agent_mapping:
  "00 - 📅 日程管理":
    - "Scheduler"

  "01 - 🤝 委托材料":
    - "Writer"

  "02 - 📄 案件分析":
    - "DocAnalyzer"
    - "Strategist"

  "03 - 🔍 法律研究":
    - "IssueIdentifier"
    - "Researcher"

  "04 - 📤 客户提供":
    - "DocAnalyzer"

  "05 - 📎 证据材料":
    - "EvidenceAnalyzer"

  "06 - 📝 法律文书":
    - "Writer"

  "07 - 📥 对方提交":
    - "DocAnalyzer"
    - "EvidenceAnalyzer"

  "08 - 🏛️ 法院送达":
    - "DocAnalyzer"
    - "Scheduler"

  "09 - 🎯 庭审笔录":
    - "DocAnalyzer"
    - "Summarizer"

  "10 - 📊 综合报告":
    - "Summarizer"
    - "Reporter"

  "11 - 📚 参考文件":
    - "Researcher"

# 变更日志
changelog:
  - version: "v1.0"
    date: "2025-12-31"
    changes:
      - "初始版本，定义Agent与目录的映射关系"
      - "按四层架构组织：输入层、分析层、输出层、支持层"
      - "提供双向映射：Agent→目录 和 目录→Agent"
    author: "GLM"
